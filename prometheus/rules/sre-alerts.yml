groups:
  - name: sre-lab-recording-rules
    rules:
      - record: sre:app_a_error_ratio_5m
        expr: (sum(rate(demo_errors_total[5m])) or vector(0)) / clamp_min(sum(rate(demo_requests_total[5m])), 0.0001)
      - record: sre:app_a_throughput_5m
        expr: sum(rate(http_server_duration_milliseconds_count{exported_job="app-a"}[5m]))
      - record: sre:app_a_p95_latency_ms_5m
        expr: histogram_quantile(0.95, sum(increase(http_server_duration_milliseconds_bucket{exported_job="app-a"}[5m])) by (le))
      - record: sre:db_query_p95_ms_5m
        expr: histogram_quantile(0.95, sum(increase(db_query_duration_ms_bucket[5m])) by (le))
      - record: sre:db_held_connections_5m
        expr: sum(increase(db_pool_hold_total[5m]))

  - name: sre-lab-alerts
    rules:
      - alert: AppALatencySLOBreached
        expr: sre:app_a_p95_latency_ms_5m > 300
        for: 2m
        labels:
          severity: warning
          team: sre-lab
        annotations:
          summary: "app-a latency SLO is breached"
          description: "app-a p95 latency stayed above 300 ms for 2 minutes."
      - alert: AppAErrorBudgetFastBurn
        expr: sre:app_a_error_ratio_5m > 0.05
        for: 2m
        labels:
          severity: critical
          team: sre-lab
        annotations:
          summary: "app-a is burning error budget quickly"
          description: "app-a 5-minute error ratio exceeded 5 percent."
      - alert: DatabaseLatencyHigh
        expr: sre:db_query_p95_ms_5m > 200
        for: 2m
        labels:
          severity: warning
          team: sre-lab
        annotations:
          summary: "database query latency is elevated"
          description: "app-c observed database query p95 above 200 ms for 2 minutes."
      - alert: DatabaseConnectionPressure
        expr: pg_stat_database_numbackends{datname="srelab"} > 6 or sre:db_held_connections_5m > 20
        for: 1m
        labels:
          severity: warning
          team: sre-lab
        annotations:
          summary: "database connection pressure is rising"
          description: "Postgres backends or held connection count are above the learning threshold."
      - alert: ResilienceFallbacksActive
        expr: sum(increase(worker_fallback_total[5m])) > 0 or sum(increase(worker_circuit_open_total[5m])) > 0
        for: 30s
        labels:
          severity: info
          team: sre-lab
        annotations:
          summary: "resilience patterns are active"
          description: "app-b is using fallback responses or has opened the circuit breaker."
